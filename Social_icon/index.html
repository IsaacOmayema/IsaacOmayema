<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>
<style>
    body {
        display: flex;
        background-color: black;
        justify-content: center;
        gap: 10px;
    }

    .backbtn {
        float: left;
        position: absolute;
        top: 0;
        left: 0;
        cursor: pointer;
        width: 50px;
        height: 50px;
        margin: 5px;
        border-radius: 40px;
        border: 0;
        background-color: transparent;
    }

    button {
        cursor: pointer;
    }

    .facebook {
        background-color: blue;
        color: white;
        content: '&#1009;';
        width: 50px;
        height: 50px;
        border-radius: 20px;
        box-shadow: -3px -6px 40px white;
        transition: width;
        border: none;
    }

    .facebook:hover {
        width: fit-content;
        transform: translateY(-5px);

    }

    .facebook:hover::after {
        color: white;
        font-family: Comic Sans MS;
        text-shadow: -1px -1px 1px black;
        content: 'Facebook';

    }



    .gmail {
        background:  red;
        color: white;
        content: '&#x2709;';
        width: 50px;
        height: 50px;
        border-radius: 20px;
        box-shadow: -3px -6px 40px white;
        transition: width;
        border: none;
    }

    .gmail:hover {
        width: fit-content;
        transform: translateY(-5px);

    }

    .gmail:hover::after {
        color: white;
        font-family: Comic Sans MS;
        text-shadow: -1px -1px 1px black;
        content: 'Gmail';

    }


    .whatsapp {
        background: green;
        color: white;
        content: '&#x2709;';
        width: 50px;
        height: 50px;
        border-radius: 20px;
        box-shadow: -3px -6px 40px white;
        transition: width;
        border: none;
    }

    .whatsapp:hover {
        width: fit-content;
        transform: translateY(-5px);

    }

    .whatsapp:hover::after {
        color: white;
        font-family: Comic Sans MS;
        text-shadow: -1px -1px 1px black;
        content: 'WhatsApp';

    }



    .tiktok {
        background: black;
        color: white;
        content: '&#x2709;';
        width: 50px;
        height: 50px;
        border-radius: 20px;
        box-shadow: -3px -6px 40px white;
        transition: width;
        border: none;
    }

    .tiktok:hover {
        width: fit-content;
        transform: translateY(-5px);

    }

    .tiktok:hover::after {
        color: white;
        font-family: Comic Sans MS;
        text-shadow: -1px -1px 1px black;
        content: 'TikTok';

    }

    .instagram {
        background: linear-gradient(to right, #f9ce34, #ee2a7b, #6228d7);
        color: white;
        content: '&#x2709;';
        width: 50px;
        height: 50px;
        border-radius: 20px;
        box-shadow: -3px -6px 40px white;
        transition: width;
        border: none;
    }

    .instagram:hover {
        width: fit-content;
        transform: translateY(-5px);

    }

    .instagram:hover::after {
        color: white;
        font-family: Comic Sans MS;
        text-shadow: -1px -1px 1px black;
        content: 'Instagram';

    }
</style>
